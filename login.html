<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in · _._kret_._ DonutSMP Utils</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='40' fill='%23ff2d92'/%3E%3C/svg%3E" />
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="header-host"></div>

<main>
  <div class="auth-wrap">
    <!-- Step 1: email + password -->
    <div id="step-credentials">
      <h1>Welcome back</h1>
      <p class="sub">Sign in to like, comment and manage your stuff.</p>
      <div id="error-box"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" id="signin">Sign in</button>
      <div class="switch">No account? <a href="register.html">Create one</a></div>
    </div>

    <!-- Step 2: 2FA (only shown if required) -->
    <div id="step-2fa" class="hidden">
      <h1>Two-factor code</h1>
      <p class="sub">Open your authenticator app and enter the 6-digit code.</p>
      <div id="error-box-2fa"></div>
      <div class="form-group">
        <label>Authentication code</label>
        <input type="text" id="totp" inputmode="numeric" maxlength="6" autocomplete="one-time-code">
      </div>
      <button class="btn btn-primary" id="verify-totp">Verify</button>
    </div>
  </div>
</main>

<div id="footer-host"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/background.js"></script>
<script>
(async function () {
  await KU.renderHeader();
  KU.renderFooter();

  // Already signed in?
  const existing = await KU.getCurrentUser();
  if (existing) {
    const { data: { currentLevel, nextLevel } } = await db.auth.mfa.getAuthenticatorAssuranceLevel();
    if (currentLevel === nextLevel) {
      window.location.href = 'index.html';
      return;
    }
  }

  const errBox = document.getElementById('error-box');
  const errBox2 = document.getElementById('error-box-2fa');
  const credStep = document.getElementById('step-credentials');
  const mfaStep = document.getElementById('step-2fa');

  function showErr(box, msg) {
    box.innerHTML = `<div class="alert alert-error">${KU.escapeHtml(msg)}</div>`;
  }

  async function checkMfaOrRedirect() {
    const { data, error } = await db.auth.mfa.getAuthenticatorAssuranceLevel();
    if (error) { window.location.href = 'index.html'; return; }
    if (data.currentLevel === data.nextLevel) {
      window.location.href = 'index.html';
      return;
    }
    // Need 2FA
    credStep.classList.add('hidden');
    mfaStep.classList.remove('hidden');
  }

  document.getElementById('signin').addEventListener('click', async () => {
    errBox.innerHTML = '';
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showErr(errBox, 'Please fill in both fields.'); return; }
    const btn = document.getElementById('signin');
    btn.disabled = true;
    const { error } = await db.auth.signInWithPassword({ email, password });
    btn.disabled = false;
    if (error) { showErr(errBox, error.message); return; }
    await checkMfaOrRedirect();
  });

  document.getElementById('verify-totp').addEventListener('click', async () => {
    errBox2.innerHTML = '';
    const code = document.getElementById('totp').value.trim();
    if (!/^\d{6}$/.test(code)) { showErr(errBox2, 'Enter the 6-digit code.'); return; }
    const btn = document.getElementById('verify-totp');
    btn.disabled = true;

    // Find the TOTP factor
    const { data: factors, error: fErr } = await db.auth.mfa.listFactors();
    if (fErr || !factors.totp?.length) { showErr(errBox2, 'No 2FA factor found.'); btn.disabled = false; return; }
    const factorId = factors.totp[0].id;

    const { data: challenge, error: cErr } = await db.auth.mfa.challenge({ factorId });
    if (cErr) { showErr(errBox2, cErr.message); btn.disabled = false; return; }

    const { error: vErr } = await db.auth.mfa.verify({
      factorId, challengeId: challenge.id, code
    });
    btn.disabled = false;
    if (vErr) { showErr(errBox2, vErr.message); return; }
    window.location.href = 'index.html';
  });
})();
</script>
</body>
</html>
